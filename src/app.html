<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1f1e1d" media="(prefers-color-scheme: dark)" />

		<title>JWLBackup — seus backups do JW Library, no navegador</title>
		<meta
			name="description"
			content="Abra, edite e exporte para Markdown seus backups do JW Library. Sem servidor, sem upload, sem rastreamento. Tudo acontece no seu navegador."
		/>

		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="pt_BR" />
		<meta property="og:site_name" content="JWLBackup" />
		<meta property="og:title" content="JWLBackup — seus backups do JW Library, no navegador" />
		<meta
			property="og:description"
			content="Abra, edite e exporte para Markdown seus backups do JW Library. Privado, local, open source."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="JWLBackup — seus backups do JW Library, no navegador." />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="JWLBackup" />
		<meta
			name="twitter:description"
			content="Abra, edite e exporte para Markdown seus backups do JW Library. Privado, local, open source."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		<!-- iOS PWA -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="JWLBackup" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
